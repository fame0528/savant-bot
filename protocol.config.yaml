# Protocol Config — Project-specific configuration for ECHO Protocol
#
# QUICK START: Change these 3 lines for your project:
#   1. language:       "rust" | "typescript" | "python" | "go" | "java" | "csharp"
#   2. commands.build: your compile/build command
#   3. commands.test:  your test runner command
#
# OPTIMIZATION POLICY (2026-06-16, FID-2026-0616-001):
#   All circuit-breaker values match ECHO.md canonical. All quality values
#   match coding-standards/rust.md Quality Overrides. session.max_session_hours
#   is operator policy and is exempt from canonical reset.
#
#   To override any value deliberately, add an inline comment naming the
#   canonical source you are deviating from AND the operator-provided reason.
#   Silent overrides are flagged on the next boot (FID-creation on delta).

project:
  name: "savant-bot"
  description: "Savant ecosystem Discord bot — Rust-native, Poise/Serenity, part of the fame0528/savant stack"
  version: "0.0.1"  # savant-bot's own application version (independent of ECHO protocol version)

protocol:
  version: "0.1.3"  # ECHO Protocol version this project conforms to (MUST match VERSION file at project root)
  strict_mode: true  # true = all 15 laws active (default), false = core 4 laws only

language: "rust"  # rust | typescript | python | go | java | csharp

commands:
  build: "cargo build"
  test: "cargo test"
  type_check: "cargo check"
  lint: "cargo clippy --all-targets -- -D warnings"
  format: "cargo fmt"
  clean: "cargo clean"

paths:
  src: "src/"
  tests: "tests/"
  docs: "docs/"
  dev: "dev/"
  fids: "dev/fids/"
  fids_archive: "dev/fids/archive/"
  session_summaries: "dev/session-summaries/"
  learnings: "dev/LEARNINGS.md"
  # research/ is an operator working folder for cloned reference repos used during
  # FID planning. It is NOT a code path. Shallow clones live here. Not gitignored
  # at this stage (operator decision); can be added to .gitignore later.
  research: "research/"

# Quality limits — canonical source: coding-standards/rust.md (Quality Overrides section)
# These override the ECHO.md defaults (300/50/100) only when the language standard specifies
# different values. For Rust, the values match the defaults (300/50/100). Any deviation must
# be justified inline.
quality:
  max_file_lines: 300      # canonical: 300 (coding-standards/rust.md, ECHO default)
  max_function_lines: 50   # canonical: 50 (coding-standards/rust.md, ECHO default)
  max_line_length: 100     # canonical: 100 (coding-standards/rust.md, ECHO default, rustfmt default)
  max_complexity: 10       # canonical: 10 (ECHO default)
  max_params: 4            # canonical: 4 (ECHO default; functions with 5+ params are a refactoring smell)
  max_comment_density: 0.33  # canonical: 0.33 (ECHO default)
  max_nesting_depth: 3     # canonical: 3 (ECHO default)

# Naming rules: see coding-standards/{language}.md

testing:
  fuzz_enabled: false
  mutation_enabled: false
  coverage_threshold: 80
  test_timeout: 30
  parallel_tests: true

fid:
  auto_create: true
  severity_levels: ["critical", "high", "medium", "low"]
  max_open_fids: 20

# Perfection Loop circuit breakers — canonical source: ECHO.md (Circuit Breaker Rules section)
# These are protocol-level guarantees, not configurable style preferences. Overriding them
# weakens ECHO's self-correcting guardrails. Any deviation must be justified inline with
# the operator's stated reason.
perfection_loop:
  max_iterations: 10         # canonical: 10 (ECHO.md Rule #5: "Hard Stop — 10 maximum iterations per loop")
  change_threshold: 0.10     # canonical: 0.10 (ECHO.md Rule #1: "Max Changes Per Pass — 10% of total character count")
  convergence_threshold: 0.02  # canonical: 0.02 (ECHO.md Rule #3: "Stop if change delta < 2% for 2 consecutive passes")
  convergence_passes: 2      # canonical: 2 (ECHO.md Rule #3: "...for 2 consecutive passes")
  oscillation_limit: 3       # canonical: 3 (ECHO.md Rule #4: "If same issue reappears 3 times, escalate")

session:
  auto_summary: true
  summary_interval: 30
  max_session_hours: 12  # operator policy: 12 hours (ECHO default is 4; kept at operator's setting as this is operational scheduling, not a code-quality guardrail)
  autonomy_level: 3  # 1=Guided, 2=Supervised, 3=Autonomous (default)
